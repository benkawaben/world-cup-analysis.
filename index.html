<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Analysis</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a2e38, #0a1a1f);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .card {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { color: #1DA1F2; margin-bottom: 10px; font-size: 2rem; }
        .twitter-icon {
            background: #1DA1F2;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 28px;
        }
        .status-box {
            background: #11242e;
            border-radius: 20px;
            padding: 20px;
            margin: 25px 0;
            text-align: left;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }
        .btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        .btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }
        .btn:not(:disabled):hover { background: #218838; transform: scale(1.01); }
        .progress-bar {
            height: 8px;
            background: #2c5a6b;
            border-radius: 4px;
            margin: 15px 0;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #1DA1F2;
            transition: width 1s linear;
        }
        .team-btn {
            background: #1e3a47;
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 40px;
            margin: 5px;
            cursor: pointer;
        }
        .team-btn.selected { background: #1DA1F2; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="twitter-icon">🐦</div>
    <h1>⚽ World Cup 2026</h1>
    <p>Exclusive AI analysis & predictions</p>

    <div class="status-box">
        <div class="status-item"><span>🔐 Social Verification:</span><span id="xStatus">⏳ Pending</span></div>
        <div class="status-item"><span>⏱️ Time (10s):</span><span id="timerStatus">0 / 10</span></div>
        <div class="status-item"><span>📜 Scroll (40%):</span><span id="scrollStatus">0%</span></div>
        <div class="status-item"><span>✅ Team Pick:</span><span id="pickStatus">❌ No</span></div>
        <div class="progress-bar"><div id="timeProgress" class="progress-fill"></div></div>
        <div id="teamButtons">
            <button class="team-btn" data-team="Brazil">🇧🇷 Brazil</button>
            <button class="team-btn" data-team="France">🇫🇷 France</button>
            <button class="team-btn" data-team="Argentina">🇦🇷 Argentina</button>
        </div>
    </div>

    <button id="ctaBtn" class="btn" disabled>🔒 Unlock Full Report</button>
    <p style="font-size: 12px; margin-top: 20px; opacity: 0.6;">© World Cup Analysis Hub</p>
</div>

<script>
    // ======================== CONFIG =========================
    // !! IMPORTANT: Replace with your actual Monetag link !!
    const MONETAG_URL = "https://shorturl.at/vnVDP";
    const X_POST_URL = "https://x.com/hibahiba19077/status/2047538178890858618";
    // ========================================================

    // --- Tracking Variables ---
    let startTime = Date.now();
    let xOpened = false;
    let teamSelected = false;
    let maxScroll = 0;
    let timerInterval = null;
    let allConditionsMet = false;

    // --- DOM Elements ---
    const ctaBtn = document.getElementById('ctaBtn');
    const timerStatusSpan = document.getElementById('timerStatus');
    const scrollStatusSpan = document.getElementById('scrollStatus');
    const pickStatusSpan = document.getElementById('pickStatus');
    const xStatusSpan = document.getElementById('xStatus');
    const timeProgressFill = document.getElementById('timeProgress');
    const teamBtns = document.querySelectorAll('.team-btn');

    // --- Helper: Update UI ---
    function updateUI() {
        const elapsed = (Date.now() - startTime) / 1000;
        const timeOk = elapsed >= 10;
        timerStatusSpan.innerText = `${Math.min(10, elapsed.toFixed(1))} / 10`;
        timeProgressFill.style.width = `${Math.min(100, (elapsed / 10) * 100)}%`;

        const scrollOk = maxScroll >= 40;
        scrollStatusSpan.innerText = `${maxScroll}%`;
        pickStatusSpan.innerText = teamSelected ? "✅ Yes" : "❌ No";
        xStatusSpan.innerText = xOpened ? "✅ Verified" : "⚠️ Click below";

        allConditionsMet = timeOk && scrollOk && teamSelected && xOpened;

        if (allConditionsMet && ctaBtn.disabled) {
            ctaBtn.disabled = false;
            ctaBtn.innerText = "📥 Get Full Analysis Now 📥";
            ctaBtn.style.background = "#28a745";
        } else if (!allConditionsMet && !ctaBtn.disabled) {
            ctaBtn.disabled = true;
            ctaBtn.innerText = "🔒 Complete all steps first";
            ctaBtn.style.background = "#555";
        }
    }

    // --- Scroll Tracking ---
    function updateScrollPercent() {
        const scrollY = window.scrollY;
        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
        if (docHeight > 0) {
            let percent = (scrollY / docHeight) * 100;
            percent = Math.min(100, Math.max(0, percent));
            if (percent > maxScroll) maxScroll = Math.floor(percent);
            updateUI();
        }
    }

    window.addEventListener('scroll', updateScrollPercent);
    window.addEventListener('resize', updateScrollPercent);
    setTimeout(updateScrollPercent, 500);

    // --- Timer Progress ---
    timerInterval = setInterval(() => {
        updateUI();
        if ((Date.now() - startTime) / 1000 >= 10) {
            // Timer done, but we keep updating UI only
        }
    }, 200);

    // --- Team Selection ---
    teamBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            teamBtns.forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            teamSelected = true;
            updateUI();
        });
    });

    // --- X / Twitter Verification (opens in new tab) ---
    function openXVerification() {
        if (!xOpened) {
            const xWindow = window.open(X_POST_URL, '_blank');
            if (xWindow && !xWindow.closed) {
                xOpened = true;
                updateUI();
                // Optional: try to close after 3 seconds? Better to leave open for tracking.
            } else {
                alert("⚠️ Please allow pop-ups for this site to verify via X (Twitter).");
                // Provide a manual link
                xStatusSpan.innerHTML = `<a href="${X_POST_URL}" target="_blank">Click here to verify manually</a>`;
            }
        }
    }

    // Automatically try to open X verification after 1 second (user might need to click "allow popups")
    setTimeout(() => {
        openXVerification();
    }, 1000);

    // Also allow manual click on status area
    xStatusSpan.style.cursor = 'pointer';
    xStatusSpan.addEventListener('click', openXVerification);

    // --- Final CTA: Redirect to Monetag ---
    ctaBtn.addEventListener('click', () => {
        if (allConditionsMet) {
            console.log("✅ All conditions met! Redirecting to Monetag...");
            window.location.href = MONETAG_URL;
        } else {
            alert("Please complete all verification steps:\n- Open X post\n- Wait 10 seconds\n- Scroll down at least 40%\n- Pick a team");
        }
    });

    // Initial call
    updateUI();
    console.log("Page loaded. Waiting for user interaction.");
</script>
</body>
</html>
