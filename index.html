<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 Analysis</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a2e38, #0a1a1f);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 35px 25px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { color: #1DA1F2; margin-bottom: 8px; font-size: 1.8rem; }
        .twitter-icon {
            background: #1DA1F2;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 28px;
        }
        .steps {
            background: #11242e;
            border-radius: 20px;
            padding: 20px;
            margin: 25px 0;
            text-align: left;
        }
        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            padding: 8px;
            border-radius: 12px;
            background: #0a1a1f;
        }
        .step-icon { font-size: 24px; min-width: 40px; text-align: center; }
        .step-text { flex: 1; }
        .step-status { font-weight: bold; min-width: 70px; text-align: right; }
        .step.completed { background: #1e3a47; border-left: 4px solid #28a745; }
        .progress-bar {
            height: 8px;
            background: #2c5a6b;
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #1DA1F2;
            transition: width 0.3s ease;
        }
        .team-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .team-btn {
            background: #1e3a47;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .team-btn.selected { background: #1DA1F2; }
        .btn-main {
            background: #555;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: not-allowed;
            width: 100%;
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn-main.active {
            background: #28a745;
            cursor: pointer;
        }
        .btn-main.active:hover { background: #218838; transform: scale(1.01); }
        .note { font-size: 11px; opacity: 0.6; margin-top: 20px; }
        a { color: #1DA1F2; text-decoration: none; }
        .subtitle { font-size: 0.85rem; opacity: 0.8; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="card">
    <div class="twitter-icon">🐦</div>
    <h1>⚽ World Cup 2026</h1>
    <div class="subtitle">AI-Powered Analysis & Predictions</div>

    <div class="steps">
        <div class="step" id="stepX">
            <div class="step-icon">🔗</div>
            <div class="step-text">Verify via X (Twitter)</div>
            <div class="step-status" id="xStatus">⏳</div>
        </div>
        <div class="step" id="stepTime">
            <div class="step-icon">⏱️</div>
            <div class="step-text">Stay on page (10 seconds)</div>
            <div class="step-status" id="timeStatus">0/10</div>
        </div>
        <div class="step" id="stepScroll">
            <div class="step-icon">📜</div>
            <div class="step-text">Scroll down (40%)</div>
            <div class="step-status" id="scrollStatus">0%</div>
        </div>
        <div class="step" id="stepPick">
            <div class="step-icon">✅</div>
            <div class="step-text">Pick a winner</div>
            <div class="step-status" id="pickStatus">❌</div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="team-buttons" id="teamButtons">
            <button class="team-btn" data-team="Brazil">🇧🇷 Brazil</button>
            <button class="team-btn" data-team="France">🇫🇷 France</button>
            <button class="team-btn" data-team="Argentina">🇦🇷 Argentina</button>
            <button class="team-btn" data-team="Germany">🇩🇪 Germany</button>
        </div>
    </div>

    <button id="ctaBtn" class="btn-main">🔒 Complete All Steps</button>
    <div class="note">✅ Source verified • Secure access</div>
</div>

<script>
    // ============================================================
    // 🔥 CORRECT CONFIGURATION (Three distinct roles)
    // ============================================================
    const X_POST_URL = "https://x.com/hibahiba19077/status/2047538178890858618";
    const MONETAG_URL = "https://shorturl.at/vnVDP";
    // Your GitHub page itself is this page (no need to link to itself)
    // ============================================================

    // Tracking variables
    let startTime = Date.now();
    let xVerified = false;
    let teamSelected = false;
    let selectedTeam = null;
    let maxScrollPercent = 0;
    let allCompleted = false;

    // DOM elements
    const ctaBtn = document.getElementById('ctaBtn');
    const timeStatusSpan = document.getElementById('timeStatus');
    const scrollStatusSpan = document.getElementById('scrollStatus');
    const pickStatusSpan = document.getElementById('pickStatus');
    const xStatusSpan = document.getElementById('xStatus');
    const progressFill = document.getElementById('progressFill');
    const stepXDiv = document.getElementById('stepX');
    const stepTimeDiv = document.getElementById('stepTime');
    const stepScrollDiv = document.getElementById('stepScroll');
    const stepPickDiv = document.getElementById('stepPick');

    // Helper: Update progress and UI
    function updateUI() {
        const elapsed = (Date.now() - startTime) / 1000;
        const timeCompleted = elapsed >= 10;
        const scrollCompleted = maxScrollPercent >= 40;
        const allSteps = xVerified && timeCompleted && scrollCompleted && teamSelected;
        
        // Update displays
        timeStatusSpan.innerText = timeCompleted ? '✅' : `${Math.min(10, elapsed.toFixed(1))}/10`;
        scrollStatusSpan.innerText = scrollCompleted ? '✅' : `${maxScrollPercent}%`;
        pickStatusSpan.innerText = teamSelected ? '✅' : '❌';
        xStatusSpan.innerText = xVerified ? '✅' : '⏳';
        
        // Update step styling
        stepXDiv.classList.toggle('completed', xVerified);
        stepTimeDiv.classList.toggle('completed', timeCompleted);
        stepScrollDiv.classList.toggle('completed', scrollCompleted);
        stepPickDiv.classList.toggle('completed', teamSelected);
        
        // Progress bar (0-100%)
        let progress = 0;
        if (xVerified) progress += 25;
        if (timeCompleted) progress += 25;
        if (scrollCompleted) progress += 25;
        if (teamSelected) progress += 25;
        progressFill.style.width = `${progress}%`;
        
        // Enable/disable CTA button
        if (allSteps && !allCompleted) {
            allCompleted = true;
            ctaBtn.classList.add('active');
            ctaBtn.innerText = "📥 Get Full Analysis Report 📥";
            ctaBtn.disabled = false;
            ctaBtn.style.cursor = 'pointer';
        } else if (!allSteps && allCompleted) {
            allCompleted = false;
            ctaBtn.classList.remove('active');
            ctaBtn.innerText = "🔒 Complete All Steps";
            ctaBtn.disabled = true;
            ctaBtn.style.cursor = 'not-allowed';
        }
    }
    
    // Scroll tracking
    function updateScrollPercent() {
        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
        if (docHeight > 0) {
            let percent = (window.scrollY / docHeight) * 100;
            percent = Math.min(100, Math.max(0, percent));
            if (percent > maxScrollPercent) {
                maxScrollPercent = Math.floor(percent);
                updateUI();
            }
        }
    }
    
    window.addEventListener('scroll', updateScrollPercent);
    window.addEventListener('resize', updateScrollPercent);
    setTimeout(updateScrollPercent, 500);
    
    // Timer
    const timerInterval = setInterval(() => {
        updateUI();
        if ((Date.now() - startTime) / 1000 >= 10) {
            // Just keep updating; no need to clear
        }
    }, 200);
    
    // Team selection
    const teamBtns = document.querySelectorAll('.team-btn');
    teamBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            teamBtns.forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedTeam = btn.getAttribute('data-team');
            teamSelected = true;
            updateUI();
        });
    });
    
    // X Verification - opens Twitter in a new tab
    function verifyWithX() {
        if (!xVerified) {
            const xWindow = window.open(X_POST_URL, '_blank');
            if (xWindow && !xWindow.closed) {
                xVerified = true;
                updateUI();
            } else {
                alert("⚠️ Please allow pop-ups for this website, or click the X link manually.");
                // Provide a fallback link
                xStatusSpan.innerHTML = `<a href="${X_POST_URL}" target="_blank" style="color:#1DA1F2;">Click to verify</a>`;
                // Still allow manual verification
                const checkManual = setInterval(() => {
                    if (xVerified) clearInterval(checkManual);
                }, 1000);
            }
        }
    }
    
    // Auto-try to open X after 1 second
    setTimeout(() => {
        verifyWithX();
    }, 800);
    
    // Also allow clicking on the step to retry
    stepXDiv.style.cursor = 'pointer';
    stepXDiv.addEventListener('click', verifyWithX);
    
    // Final CTA: redirect to MONETAG (not to GitHub)
    ctaBtn.addEventListener('click', () => {
        if (allCompleted && xVerified && teamSelected && maxScrollPercent >= 40 && (Date.now() - startTime)/1000 >= 10) {
            console.log("✅ All conditions met. Redirecting to Monetag...");
            window.location.href = MONETAG_URL;
        } else {
            alert("Please complete all verification steps:\n1. Open X post\n2. Wait 10 seconds\n3. Scroll at least 40%\n4. Pick a team");
        }
    });
    
    updateUI();
    console.log("GitHub Prelander loaded. Waiting for user interaction.");
</script>
</body>
</html>
